name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fixtures:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run fixture suite
        run: python3 tests/run_fixtures.py
